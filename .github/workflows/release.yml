name: Build Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore RemotePlayLauncher.csproj
          dotnet build RemotePlayLauncher.csproj -c Release --no-restore
          dotnet run --project tests/SmokeTests/SmokeTests.csproj -c Release

      - name: Publish application
        shell: pwsh
        run: dotnet publish RemotePlayLauncher.csproj -c Release -r win-x64 --self-contained true -o artifacts/publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer and checksums
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer/CoopLauncher.iss
          $setup = "artifacts/installer/CoopLauncher-Setup-$version.exe"
          $portable = "artifacts/publish/CoopLauncher.exe"
          Copy-Item $portable "artifacts/installer/CoopLauncher-Portable-$version.exe"
          @(
            (Get-FileHash $setup -Algorithm SHA256).Hash + "  " + (Split-Path $setup -Leaf),
            (Get-FileHash "artifacts/installer/CoopLauncher-Portable-$version.exe" -Algorithm SHA256).Hash + "  CoopLauncher-Portable-$version.exe"
          ) | Set-Content "artifacts/installer/SHA256SUMS.txt" -Encoding ascii

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            artifacts/installer/CoopLauncher-Setup-*.exe `
            artifacts/installer/CoopLauncher-Portable-*.exe `
            artifacts/installer/SHA256SUMS.txt `
            --title "Coop Launcher ${{ github.ref_name }}" `
            --generate-notes
